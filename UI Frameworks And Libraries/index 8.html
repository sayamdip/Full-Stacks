<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body>
<form>
  <div class="container mt-3">
    <label for="exampleInputEmail1" class="form-label">Email address</label>
    <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
    <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
  </div>
  <div class="container mt-2">
    <label for="exampleInputPassword1" class="form-label">Password</label>
    <input type="password" class="form-control" id="exampleInputPassword1">
  </div>
  <div class="container mt-3">
    <input type="checkbox" class="form-check-input" id="exampleCheck1">
    <label class="form-check-label" for="exampleCheck1">Check me out</label>
  </div>
  <div class="container mt-2">
         <button type="submit" class="btn btn-primary">Submit</button>
    </div>
    <div class="container mt-3">
      <div class="form-check form-switch">
      <input class="form-check-input" type="checkbox" role="switch" id="switchCheckDefault">
      <label class="form-check-label" for="switchCheckDefault">Default switch checkbox input</label>
    </div>
    <div class="form-check form-switch">
      <input class="form-check-input" type="checkbox" role="switch" id="switchCheckChecked" checked>
      <label class="form-check-label" for="switchCheckChecked">Checked switch checkbox input</label>
    </div>
    <div class="form-check form-switch">
      <input class="form-check-input" type="checkbox" role="switch" id="switchCheckDisabled" disabled>
      <label class="form-check-label" for="switchCheckDisabled">Disabled switch checkbox input</label>
    </div>
    <div class="form-check form-switch">
      <input class="form-check-input" type="checkbox" role="switch" id="switchCheckCheckedDisabled" checked disabled>
      <label class="form-check-label" for="switchCheckCheckedDisabled">Disabled checked switch checkbox input</label>
    </div>
  </div>
  <div class="container mt-3">
    <div class="form-floating">
      <input type="email" class="form-control" id="addressInput" placeholder="Address">
      <label for="addressInput">Address Line 1</label>
    </div>
  </div>
  <div class="container mt-3">
    <div class="form-floating">
      <input type="email" class="form-control" id="addressInput" placeholder="Address">
      <label for="addressInput">Address Line 2</label>
    </div>
  </div>
  <div class="container mt-3">
    <div class="form-floating">
      <input type="email" class="form-control" id="addressInput" placeholder="Address">
      <label for="addressInput">District</label>
    </div>
  </div>
  <div class="container mt-3">
    <div class="form-floating">
      <input type="email" class="form-control" id="addressInput" placeholder="Address">
      <label for="addressInput">Postal Code</label>
    </div>
  </div>
  <div class="container mt-3">
    <button type="button" class="btn btn-primary">Primary</button>
    <button type="button" class="btn btn-secondary">Secondary</button>
    <button type="button" class="btn btn-success">Success</button>
    <button type="button" class="btn btn-danger">Danger</button>
    <button type="button" class="btn btn-warning">Warning</button>
    <button type="button" class="btn btn-info">Info</button>
    <button type="button" class="btn btn-light">Light</button>
    <button type="button" class="btn btn-dark">Dark</button>
    <button type="button" class="btn btn-link">Link</button>
  </div>
</div>
<div class="container mt-3">
    
</div>
</form>
</body>
</html>
