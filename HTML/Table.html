<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Table</title>
</head>
<body>
    <h1>Our Menu</h1>
    <h2>Falafel</h2>
    <p>Chickpea, herbs and spices.</p>
    <img src="./Falafel.webp" width="240" height="135" alt="Image Not Found">
    <h2>Pasta Salad</h2>
    <p>Lettuce, vegetables and mozzarella.</p>
    <img src="./Salad.jpg" width="240" height="135" alt="Image Not Found">
    <a href="./Basic_Syntax.html">Our Location</a>
    <style>
        table,th,td{
            border: 1px solid black;
            border-collapse: collapse;
        }
    </style>
    <table>
        <tr>
            <th>Dish</th>
            <th>Price</th>
        </tr>
        <tr>
            <td>Falafel</td>
            <td>$10.00</td>
        </tr>
        <tr>
            <td>Pasta Salad</td>
            <td>$12.00</td>
        </tr>
    </table>
</body>
</html>
