<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <form action="Registration" method="POST">
        <h2>Text Tag</h2>
        <label for="username">Username:</label><br>
        <input type="text" name="username"><br>

        <h2>Password Text</h2>
        <label for="password">Password:</label><br>
        <input type="password"><br>
        <input type="submit">

        <h2>Checkbox</h2>
        <input type="checkbox" name="Dog" value="Dog">
        <label for="Dog">I Own A Dog</label><br>

        <input type="checkbox" name="Cat" value="Cat">
        <label for="Cat">I Own A Cat</label>

        <h2>Radio Button</h2>
        <input type="radio" name="Right" value="Right">
        <label for="Right">I Am Right-Handed</label><br>

        <input type="radio" name="Left" value="Left">
        <label for="Left">I Am Left-Handed</label>

        <h2>Other Type Of Inputs</h2>
        <label for="number">Number:</label><br>
        <input type="number" name="Age"><br>

        <label for="email">Email:</label><br>
        <input type="email" name="Email"><br>

        <label for="number">Choose A File</label><br>
        <input type="file" name="File">

        <h2>Text Area Tag</h2>
        <textarea name="multiline" rows="5" cols="25"></textarea>

        <h2>Drop-Down List</h2>
        <select name="food">
            <option value="chocolate">Chocolate</option>
            <option value="ice-cream">Ice-Cream</option>
            <option value="rice">Rice</option>
        </select>
    </form>
</body>
</html>
